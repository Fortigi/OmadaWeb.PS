# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- None

pool:
  vmImage: ubuntu-latest

steps:
- task: PowerShell@2
  displayName: 'Install Modules'
  inputs:
    targetType: 'inline'
    script: |
      "Install Pester"|Write-Host
      Install-Module -Name Pester -Scope CurrentUser -Force;
      "Install psake"|Write-Host
      Install-Module -Name psake -Scope CurrentUser -Force;
      "Install PSDeploy"|Write-Host
      Install-Module -Name PSDeploy -Scope CurrentUser -Force;
      "Install PSScriptAnalyzer"|Write-Host
      Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force;


- task: PowerShell@2
  displayName: 'Analyze'
  inputs:
    filePath: '$(System.DefaultWorkingDirectory)/Build/build.ps1'
    arguments: ' -Task Analyze'
    pwsh: true

- task: PowerShell@2
  displayName: 'Test'
  inputs:
    filePath: '$(System.DefaultWorkingDirectory)/Build/build.ps1'
    arguments: ' -Task Test'
    pwsh: true

- task: PowerShell@2
  displayName: 'Build'
  inputs:
    filePath: '$(System.DefaultWorkingDirectory)/Build/build.ps1'
    arguments: ' -Task Build'
    pwsh: true

- task: PowerShell@2
  displayName: 'ImportModule'
  inputs:
    filePath: '$(System.DefaultWorkingDirectory)/Build/build.ps1'
    arguments: ' -Task ImportModule'
    pwsh: true    

