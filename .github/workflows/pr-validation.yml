name: PR Validation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  validate:
    name: Validate (${{ matrix.shell }})
    runs-on: windows-latest
    defaults:
      run:
        shell: ${{ matrix.shell }}
    strategy:
      fail-fast: false
      matrix:
        shell: [pwsh, powershell]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check branch is up to date with main
        run: |
          git fetch origin main
          git merge-base --is-ancestor origin/main HEAD
          if ($LASTEXITCODE -ne 0) {
            Write-Error "This branch is behind 'main'. Please merge or rebase 'main' into your branch and push again."
            exit 1
          }
          Write-Host "Branch is up to date with main."

      - name: Determine changed files
        run: |
          $files = git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }}
          $joined = ($files -join ';')
          "PR_CHANGED_FILES=$joined" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install modules
        run: ./Build/InstallModules.ps1

      - name: Warm up Selenium/Edge WebDriver
        run: |
          $module = Import-Module ./OmadaWeb.PS/OmadaWeb.PS.psm1 -Force -PassThru
          & $module { Invoke-WebEdgeDriverFramework | Out-Null }
      - name: Analyze, test and build
        run: ./Build/build.ps1 -Task TestBuildOnly -BuildVersion '0.0.0'

      - name: Check for test results
        id: test-results
        if: always()
        run: |
          $exists = Test-Path 'buildoutput/TestResults.xml'
          "exists=$exists" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always() && steps.test-results.outputs.exists == 'True'
        with:
          name: Pester Tests (${{ matrix.shell }})
          path: buildoutput/TestResults.xml
          reporter: java-junit
