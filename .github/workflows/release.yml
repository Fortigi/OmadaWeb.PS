name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'OmadaWeb.PS/**'
  workflow_dispatch:

permissions:
  contents: write
  checks: write

jobs:
  build:
    name: Build
    runs-on: windows-latest

    outputs:
      build_version: ${{ steps.versioning.outputs.build_version }}
      year: ${{ steps.versioning.outputs.year }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install modules
        shell: pwsh
        run: ./Build/InstallModules.ps1

      - name: Warm up Selenium/Edge WebDriver
        shell: pwsh
        run: |
          $module = Import-Module ./OmadaWeb.PS/OmadaWeb.PS.psm1 -Force -PassThru
          & $module { Invoke-WebEdgeDriverFramework | Out-Null }

      - name: Generate version number
        id: versioning
        shell: pwsh
        run: |
          $date     = Get-Date
          $version  = '{0:d4}.{1:d2}.{2:d2}.{3}' -f $date.Year, $date.Month, $date.Day, ${{ github.run_number }}
          "build_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "year=$($date.Year)"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $version"

      - name: Analyze, test and build
        shell: pwsh
        run: |
          ./Build/build.ps1 -Task TestBuildOnly -BuildVersion '${{ steps.versioning.outputs.build_version }}'

      - name: Check for test results
        id: test-results
        if: always()
        shell: pwsh
        run: |
          $exists = Test-Path 'buildoutput/TestResults.xml'
          "exists=$exists" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always() && steps.test-results.outputs.exists == 'True'
        with:
          name: Pester Tests (Release)
          path: buildoutput/TestResults.xml
          reporter: java-junit

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: BuildOutput
          path: buildoutput/

  release:
    name: Package and Release
    runs-on: windows-latest
    needs: build
    # Requires the "release" GitHub Environment with required reviewers configured
    # (Settings > Environments) for the approval gate to take effect. Until that
    # is set up, this job-level condition is the actual gate: it only runs when
    # someone manually triggers this workflow (Run workflow), never on a plain
    # push to main, so publishing always needs a deliberate human action.
    if: github.event_name == 'workflow_dispatch'
    environment: release

    env:
      BUILD_VERSION: ${{ needs.build.outputs.build_version }}
      YEAR: ${{ needs.build.outputs.year }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: BuildOutput
          path: buildoutput/

      - name: Pack NuGet package
        shell: pwsh
        run: |
          nuget pack OmadaWeb.PS.nuspec `
            -Version '${{ env.BUILD_VERSION }}' `
            -Properties "VERSION=${{ env.BUILD_VERSION }};YEAR=${{ env.YEAR }}" `
            -OutputDirectory staging/

      - name: Publish to PSGallery
        shell: pwsh
        run: |
          ./Build/PushToPsGallery.ps1 `
            -SystemDefaultWorkingDirectory '${{ github.workspace }}' `
            -PsGalleryKey '${{ secrets.PSGALLERY_API_KEY }}' `
            -BuildPath 'OmadaWeb.PS'

      - name: Create Git tag
        shell: pwsh
        run: |
          git config user.email "devops@fortigi.nl"
          git config user.name "GitHub Actions"
          git tag -a "v${{ env.BUILD_VERSION }}" -m "Release version ${{ env.BUILD_VERSION }}"
          git push origin "refs/tags/v${{ env.BUILD_VERSION }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.BUILD_VERSION }}
          name: Release v${{ env.BUILD_VERSION }}
          files: staging/*.nupkg
          generate_release_notes: true
